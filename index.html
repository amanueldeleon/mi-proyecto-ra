<!DOCTYPE html>
<html lang="es">
<head>
    <title>Mi Proyecto RA</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; }
    </style>
</head>
<body>

    <model-viewer 
        src="models/modelo.glb" 
        ios-src="models/modelo.usdz"
        ar
        camera-controls
        style="width: 100%; height: 500px;">
        shadow-intensity="1"
        alt="Modelo 3D en RA">
        
        <button slot="ar-button" style="background-color: #007bff; color: white; border-radius: 8px; border: none; padding: 10px 20px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
            Activar Realidad Aumentada
        </button>
    </model-viewer>

</body>
</html>
