<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Proyecto RA</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f0f0f0; }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
        }
    </style>
</head>
<body>

    <model-viewer 
        src="models/modelo.glb" 
        ios-src="models/modelo.usdz"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1"
        alt="Un modelo 3D en mi superficie"
        ar-scale="auto">
        
        <button slot="ar-button" style="background-color: #007bff; color: white; border-radius: 8px; border: none; padding: 10px 20px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999;">
            👋 Activar Realidad Aumentada
        </button>
    </model-viewer>

</body>
</html>
